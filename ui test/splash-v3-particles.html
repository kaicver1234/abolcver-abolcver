<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splash V3 - Particles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(180deg, #0F1629 0%, #0A0E1A 50%, #050709 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #10B981;
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat 3s ease-in-out infinite;
        }

        @keyframes particleFloat {
            0% { opacity: 0; transform: translateY(0) scale(0); }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { opacity: 0; transform: translateY(-150px) scale(1); }
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            animation: zoomFade 0.8s ease-out 2.8s forwards;
        }

        @keyframes zoomFade {
            to {
                transform: scale(1.1);
                opacity: 0;
            }
        }

        .logo-text {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            font-size: 46px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* T Logo */
        .t-logo {
            position: relative;
            width: 50px;
            height: 100px;
            margin-right: 5px;
        }

        .t-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 14px;
            background: #10B981;
            border-radius: 2px;
            transform: scaleX(0);
            animation: growX 0.3s ease-out forwards;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .t-vertical {
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%) scaleY(0);
            width: 14px;
            height: 86px;
            background: #10B981;
            border-radius: 2px;
            transform-origin: top;
            animation: growY 0.3s ease-out 0.15s forwards;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        @keyframes growX {
            to { transform: scaleX(1); }
        }

        @keyframes growY {
            to { transform: translateX(-50%) scaleY(1); }
        }

        /* Letters */
        .letter {
            opacity: 0;
            transform: translateY(30px);
            display: inline-block;
        }

        .green { 
            color: #10B981; 
        }
        
        .white { 
            color: #fff; 
        }

        .letter:nth-child(2) { animation: letterSlide 0.35s ease-out 0.35s forwards; }
        .letter:nth-child(3) { animation: letterSlide 0.35s ease-out 0.42s forwards; }
        .letter:nth-child(4) { animation: letterSlide 0.35s ease-out 0.49s forwards; }
        .letter:nth-child(5) { animation: letterSlide 0.35s ease-out 0.56s forwards; }
        .letter:nth-child(6) { animation: letterSlide 0.35s ease-out 0.63s forwards; }

        .space { width: 14px; }

        .letter:nth-child(8) { animation: letterSlide 0.35s ease-out 0.75s forwards; }
        .letter:nth-child(9) { animation: letterSlide 0.35s ease-out 0.82s forwards; }
        .letter:nth-child(10) { animation: letterSlide 0.35s ease-out 0.89s forwards; }

        @keyframes letterSlide {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Tagline */
        .tagline {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            letter-spacing: 3px;
            opacity: 0;
            animation: fadeIn 0.5s ease-out 1.2s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .version {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.25);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <div class="logo-text">
            <div class="t-logo">
                <div class="t-top"></div>
                <div class="t-vertical"></div>
            </div>
            <span class="letter green">I</span>
            <span class="letter green">K</span>
            <span class="letter green">S</span>
            <span class="letter green">A</span>
            <span class="letter green">R</span>
            <span class="space"></span>
            <span class="letter white">V</span>
            <span class="letter white">P</span>
            <span class="letter white">N</span>
        </div>
        <p class="tagline">SECURE • FAST • FREE</p>
    </div>

    <div class="version">v1.1.1</div>

    <script>
        const container = document.getElementById('particles');
        const colors = ['#10B981', '#06b6d4', '#22c55e'];
        
        for (let i = 0; i < 15; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = (20 + Math.random() * 60) + '%';
            p.style.bottom = '20%';
            p.style.animationDelay = (Math.random() * 3) + 's';
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            container.appendChild(p);
        }
    </script>
</body>
</html>
