<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tools & Speed Test - UI Redesign</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            color: white;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            margin: 20px auto;
            background: linear-gradient(180deg, #0d0d12 0%, #1a1a2e 100%);
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
        }

        /* Status Bar */
        .status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            font-size: 14px;
            font-weight: 600;
        }

        /* Header */
        .header {
            padding: 8px 20px 20px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .header span {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
        }

        /* Tools Grid */
        .tools-grid {
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .tool-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .tool-card:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .tool-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .tool-icon.speed { background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(6, 182, 212, 0.1) 100%); }
        .tool-icon.ip { background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(139, 92, 246, 0.1) 100%); }
        .tool-icon.dns { background: linear-gradient(135deg, rgba(249, 115, 22, 0.2) 0%, rgba(234, 88, 12, 0.1) 100%); }

        .tool-info {
            flex: 1;
        }

        .tool-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .tool-desc {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }

        .tool-arrow {
            color: rgba(255,255,255,0.3);
            font-size: 18px;
        }

        /* Speed Test Section */
        .speed-test-container {
            display: none;
            padding: 20px;
            text-align: center;
        }

        .speed-gauge {
            position: relative;
            width: 280px;
            height: 180px;
            margin: 20px auto;
        }

        .gauge-bg {
            position: absolute;
            width: 280px;
            height: 140px;
            border-radius: 140px 140px 0 0;
            background: rgba(255,255,255,0.05);
            border: 3px solid rgba(255,255,255,0.1);
            border-bottom: none;
            overflow: hidden;
        }

        .gauge-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 0%;
            background: linear-gradient(180deg, #10b981 0%, #06b6d4 100%);
            transition: height 0.5s ease;
            border-radius: 140px 140px 0 0;
        }

        .gauge-center {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 100px;
            background: linear-gradient(180deg, #0d0d12 0%, #1a1a2e 100%);
            border-radius: 100px 100px 0 0;
        }

        .speed-value {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .speed-number {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .speed-unit {
            font-size: 16px;
            color: rgba(255,255,255,0.5);
        }

        .speed-label {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin-top: 8px;
        }

        /* Speed Stats */
        .speed-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 30px;
        }

        .speed-stat {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 16px 12px;
            text-align: center;
        }

        .speed-stat-icon {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .speed-stat-value {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .speed-stat-label {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
        }

        .speed-stat.download .speed-stat-value { color: #76F959; }
        .speed-stat.upload .speed-stat-value { color: #72D9FF; }
        .speed-stat.ping .speed-stat-value { color: #FFD700; }

        /* Start Button */
        .start-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            border-radius: 16px;
            color: white;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }

        .start-btn:disabled {
            background: rgba(255,255,255,0.1);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Back Button */
        .back-btn {
            position: absolute;
            top: 60px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            z-index: 10;
        }

        /* Progress Animation */
        .progress-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
        }

        .progress-ring circle {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
        }

        .progress-ring .bg {
            stroke: rgba(255,255,255,0.1);
        }

        .progress-ring .progress {
            stroke: url(#gradient);
            stroke-dasharray: 339.292;
            stroke-dashoffset: 339.292;
            transform: rotate(-90deg);
            transform-origin: center;
            transition: stroke-dashoffset 0.5s ease;
        }

        /* Animated Grid Background */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            opacity: 0.5;
        }

        /* Bottom Tab Bar */
        .tab-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 90px;
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            padding: 12px 24px 30px;
            gap: 16px;
        }

        .tab-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            height: 56px;
            border-radius: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(255,255,255,0.4);
        }

        .tab-item.active {
            background: rgba(255,255,255,0.12);
            color: white;
        }

        .tab-item span {
            font-size: 15px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="grid-bg"></div>

        <!-- Status Bar -->
        <div class="status-bar">
            <span>۹:۴۱</span>
            <span>📶 🔋</span>
        </div>

        <!-- Tools List View -->
        <div id="toolsView">
            <!-- Header -->
            <div class="header">
                <h1>ابزارها</h1>
                <span>ابزارهای کاربردی شبکه</span>
            </div>

            <!-- Tools Grid -->
            <div class="tools-grid">
                <div class="tool-card" onclick="showSpeedTest()">
                    <div class="tool-icon speed">⚡</div>
                    <div class="tool-info">
                        <div class="tool-name">تست سرعت</div>
                        <div class="tool-desc">سرعت دانلود و آپلود را بسنجید</div>
                    </div>
                    <div class="tool-arrow">‹</div>
                </div>

                <div class="tool-card" onclick="alert('IP Info')">
                    <div class="tool-icon ip">🌐</div>
                    <div class="tool-info">
                        <div class="tool-name">اطلاعات IP</div>
                        <div class="tool-desc">مشاهده IP و موقعیت مکانی</div>
                    </div>
                    <div class="tool-arrow">‹</div>
                </div>

                <div class="tool-card" onclick="alert('Host Checker')">
                    <div class="tool-icon dns">🔍</div>
                    <div class="tool-info">
                        <div class="tool-name">بررسی هاست</div>
                        <div class="tool-desc">تست دسترسی به وبسایت‌ها</div>
                    </div>
                    <div class="tool-arrow">‹</div>
                </div>
            </div>
        </div>

        <!-- Speed Test View -->
        <div class="speed-test-container" id="speedTestView">
            <div class="back-btn" onclick="hideSpeedTest()">‹</div>
            
            <h2 style="font-size: 24px; margin-bottom: 8px;">تست سرعت</h2>
            <p style="color: rgba(255,255,255,0.5); font-size: 14px;">سرعت اتصال خود را بسنجید</p>

            <!-- Speed Gauge -->
            <div class="speed-gauge">
                <div class="gauge-bg">
                    <div class="gauge-fill" id="gaugeFill"></div>
                </div>
                <div class="gauge-center"></div>
                <div class="speed-value">
                    <div class="speed-number" id="speedNumber">0</div>
                    <div class="speed-unit">Mbps</div>
                </div>
            </div>

            <div class="speed-label" id="speedLabel">آماده برای تست</div>

            <!-- Speed Stats -->
            <div class="speed-stats">
                <div class="speed-stat ping">
                    <div class="speed-stat-icon">📡</div>
                    <div class="speed-stat-value" id="pingValue">--</div>
                    <div class="speed-stat-label">پینگ (ms)</div>
                </div>
                <div class="speed-stat download">
                    <div class="speed-stat-icon">⬇️</div>
                    <div class="speed-stat-value" id="downloadValue">--</div>
                    <div class="speed-stat-label">دانلود</div>
                </div>
                <div class="speed-stat upload">
                    <div class="speed-stat-icon">⬆️</div>
                    <div class="speed-stat-value" id="uploadValue">--</div>
                    <div class="speed-stat-label">آپلود</div>
                </div>
            </div>

            <!-- Start Button -->
            <button class="start-btn" id="startBtn" onclick="startSpeedTest()">
                شروع تست
            </button>
        </div>

        <!-- Bottom Tab Bar -->
        <div class="tab-bar">
            <div class="tab-item" onclick="location.href='vpn-redesign.html'">
                🔑
                <span>VPN</span>
            </div>
            <div class="tab-item active">
                🔧
                <span>ابزارها</span>
            </div>
        </div>
    </div>

    <script>
        let isTesting = false;

        function showSpeedTest() {
            document.getElementById('toolsView').style.display = 'none';
            document.getElementById('speedTestView').style.display = 'block';
        }

        function hideSpeedTest() {
            document.getElementById('toolsView').style.display = 'block';
            document.getElementById('speedTestView').style.display = 'none';
            resetSpeedTest();
        }

        function resetSpeedTest() {
            document.getElementById('speedNumber').textContent = '0';
            document.getElementById('gaugeFill').style.height = '0%';
            document.getElementById('speedLabel').textContent = 'آماده برای تست';
            document.getElementById('pingValue').textContent = '--';
            document.getElementById('downloadValue').textContent = '--';
            document.getElementById('uploadValue').textContent = '--';
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').textContent = 'شروع تست';
        }

        function startSpeedTest() {
            if (isTesting) return;
            isTesting = true;

            const btn = document.getElementById('startBtn');
            const label = document.getElementById('speedLabel');
            const speedNum = document.getElementById('speedNumber');
            const gauge = document.getElementById('gaugeFill');

            btn.disabled = true;
            btn.textContent = 'در حال تست...';

            // Phase 1: Ping Test
            label.textContent = 'تست پینگ...';
            setTimeout(() => {
                const ping = Math.floor(Math.random() * 50) + 20;
                document.getElementById('pingValue').textContent = ping;
                animateValue(speedNum, 0, ping, 500);
                gauge.style.height = '20%';

                // Phase 2: Download Test
                setTimeout(() => {
                    label.textContent = 'تست دانلود...';
                    const download = (Math.random() * 80 + 20).toFixed(1);
                    
                    animateValue(speedNum, ping, parseFloat(download), 2000);
                    gauge.style.height = '60%';

                    setTimeout(() => {
                        document.getElementById('downloadValue').textContent = download;

                        // Phase 3: Upload Test
                        label.textContent = 'تست آپلود...';
                        const upload = (Math.random() * 30 + 10).toFixed(1);
                        
                        animateValue(speedNum, parseFloat(download), parseFloat(upload), 1500);
                        gauge.style.height = '100%';

                        setTimeout(() => {
                            document.getElementById('uploadValue').textContent = upload;
                            label.textContent = 'تست کامل شد ✓';
                            speedNum.textContent = download;
                            btn.textContent = 'تست مجدد';
                            btn.disabled = false;
                            isTesting = false;
                        }, 1500);
                    }, 2000);
                }, 500);
            }, 1000);
        }

        function animateValue(element, start, end, duration) {
            const startTime = performance.now();
            
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                const current = start + (end - start) * easeOutQuart(progress);
                element.textContent = current.toFixed(1);
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            
            requestAnimationFrame(update);
        }

        function easeOutQuart(x) {
            return 1 - Math.pow(1 - x, 4);
        }
    </script>
</body>
</html>
