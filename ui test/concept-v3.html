<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tiksar VPN - Concept V3 (Aurora/Gradient Style)</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: white;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            background: #0f0f0f;
            border-radius: 50px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 0 12px #1a1a1a, 0 30px 60px rgba(0,0,0,0.5);
        }

        /* Aurora Background */
        .aurora-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
        }

        .aurora-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: aurora-move 8s ease-in-out infinite;
        }

        .aurora-blob.blob1 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .aurora-blob.blob2 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #06b6d4, #10b981);
            bottom: 200px;
            left: -80px;
            animation-delay: -3s;
        }

        .aurora-blob.blob3 {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #f43f5e, #ec4899);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
            opacity: 0.3;
        }

        @keyframes aurora-move {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .screen {
            position: relative;
            height: 100%;
            padding: 60px 24px 24px;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.3), rgba(139, 92, 246, 0.3));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .logo-text h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }

        .header-btns {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .header-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        /* Main Connection Area */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: -30px;
        }

        /* Connection Button - Glass Morphism */
        .connect-wrapper {
            position: relative;
            margin-bottom: 30px;
        }

        .connect-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.4) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .connect-wrapper.connected .connect-glow {
            background: radial-gradient(circle, rgba(16, 185, 129, 0.5) 0%, transparent 70%);
            opacity: 1;
            animation: glow-pulse 2s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }

        .connect-btn {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            z-index: 1;
        }

        .connect-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
            transform: scale(1.02);
        }

        .connect-wrapper.connected .connect-btn {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.3), rgba(6, 182, 212, 0.3));
            border-color: rgba(16, 185, 129, 0.5);
        }

        .connect-btn svg {
            width: 60px;
            height: 60px;
            fill: rgba(255,255,255,0.5);
            transition: all 0.4s ease;
        }

        .connect-wrapper.connected .connect-btn svg {
            fill: #10b981;
        }

        /* Orbit Ring */
        .orbit-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border: 1px dashed rgba(255,255,255,0.1);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .connect-wrapper.connected .orbit-ring {
            opacity: 1;
            animation: orbit-spin 20s linear infinite;
        }

        .orbit-dot {
            position: absolute;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
        }

        @keyframes orbit-spin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Status */
        .status {
            text-align: center;
            margin-bottom: 40px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            margin-bottom: 12px;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }

        .status-badge.connected {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
        }

        .status-badge.connected .status-dot {
            background: #10b981;
            animation: dot-pulse 1.5s ease-in-out infinite;
        }

        @keyframes dot-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .status-text {
            font-size: 15px;
            color: rgba(255,255,255,0.5);
        }

        .status-timer {
            font-size: 32px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .status-timer.visible {
            opacity: 1;
            background: linear-gradient(90deg, #10b981, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Server Card - Glass */
        .server-card {
            width: 100%;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .server-card:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.1);
        }

        .server-card-inner {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .server-avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.1));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .server-details {
            flex: 1;
        }

        .server-name {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .server-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
        }

        .server-ping {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #10b981;
        }

        .server-arrow {
            color: rgba(255,255,255,0.2);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        .stats-grid.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .stat-item {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 14px;
            text-align: center;
        }

        .stat-icon {
            font-size: 16px;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 700;
        }

        .stat-value.dl { color: #10b981; }
        .stat-value.ul { color: #06b6d4; }
        .stat-value.pg { color: #f59e0b; }

        .stat-label {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            margin-top: 2px;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: absolute;
            bottom: 24px;
            left: 24px;
            right: 24px;
            height: 64px;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 32px;
            display: flex;
            padding: 6px;
        }

        .nav-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-radius: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(255,255,255,0.4);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.2));
            color: white;
        }

        .nav-item span {
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <!-- Aurora Background -->
        <div class="aurora-bg">
            <div class="aurora-blob blob1"></div>
            <div class="aurora-blob blob2"></div>
            <div class="aurora-blob blob3"></div>
        </div>

        <div class="screen">
            <!-- Header -->
            <div class="header">
                <div class="logo">
                    <div class="logo-icon">🛡️</div>
                    <div class="logo-text">
                        <h1>Tiksar VPN</h1>
                        <span>اتصال امن و سریع</span>
                    </div>
                </div>
                <div class="header-btns">
                    <div class="header-btn">🌐</div>
                    <div class="header-btn">⚙️</div>
                </div>
            </div>

            <!-- Main Area -->
            <div class="main-area">
                <!-- Connection Button -->
                <div class="connect-wrapper" id="connectWrapper">
                    <div class="connect-glow"></div>
                    <div class="orbit-ring">
                        <div class="orbit-dot"></div>
                    </div>
                    <div class="connect-btn" onclick="toggleConnection()">
                        <svg viewBox="0 0 24 24">
                            <path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/>
                        </svg>
                    </div>
                </div>

                <!-- Status -->
                <div class="status">
                    <div class="status-badge" id="statusBadge">
                        <div class="status-dot"></div>
                        <span id="statusLabel">آماده اتصال</span>
                    </div>
                    <div class="status-text" id="statusText">برای شروع ضربه بزنید</div>
                    <div class="status-timer" id="timer">00:00:00</div>
                </div>

                <!-- Server Card -->
                <div class="server-card">
                    <div class="server-card-inner">
                        <div class="server-avatar">🚀</div>
                        <div class="server-details">
                            <div class="server-name">اتصال هوشمند</div>
                            <div class="server-meta">
                                <span>انتخاب خودکار</span>
                                <span class="server-ping">● 42ms</span>
                            </div>
                        </div>
                        <div class="server-arrow">‹</div>
                    </div>
                </div>

                <!-- Stats -->
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-item">
                        <div class="stat-icon">⬇️</div>
                        <div class="stat-value dl">45.2</div>
                        <div class="stat-label">MB/s</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon">⬆️</div>
                        <div class="stat-value ul">12.8</div>
                        <div class="stat-label">MB/s</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon">📡</div>
                        <div class="stat-value pg">42</div>
                        <div class="stat-label">ms</div>
                    </div>
                </div>
            </div>

            <!-- Bottom Nav -->
            <div class="bottom-nav">
                <div class="nav-item active">
                    🔑 <span>VPN</span>
                </div>
                <div class="nav-item">
                    🔧 <span>ابزارها</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isConnected = false;
        let timerInterval = null;
        let seconds = 0;

        function toggleConnection() {
            isConnected = !isConnected;
            
            const wrapper = document.getElementById('connectWrapper');
            const badge = document.getElementById('statusBadge');
            const label = document.getElementById('statusLabel');
            const text = document.getElementById('statusText');
            const timer = document.getElementById('timer');
            const stats = document.getElementById('statsGrid');

            if (isConnected) {
                wrapper.classList.add('connected');
                badge.classList.add('connected');
                label.textContent = 'متصل';
                text.textContent = 'Germany • Frankfurt';
                timer.classList.add('visible');
                stats.classList.add('visible');
                
                seconds = 0;
                timerInterval = setInterval(() => {
                    seconds++;
                    const h = Math.floor(seconds / 3600);
                    const m = Math.floor((seconds % 3600) / 60);
                    const s = seconds % 60;
                    timer.textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                }, 1000);
            } else {
                wrapper.classList.remove('connected');
                badge.classList.remove('connected');
                label.textContent = 'آماده اتصال';
                text.textContent = 'برای شروع ضربه بزنید';
                timer.classList.remove('visible');
                stats.classList.remove('visible');
                clearInterval(timerInterval);
            }
        }
    </script>
</body>
</html>
