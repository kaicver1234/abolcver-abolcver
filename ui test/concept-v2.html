<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tiksar VPN - Concept V2 (Neumorphism + Minimal)</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: #121212;
            min-height: 100vh;
            color: white;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            background: #1a1a1a;
            border-radius: 50px;
            overflow: hidden;
            position: relative;
            box-shadow: 
                0 0 0 12px #0a0a0a,
                0 30px 60px rgba(0,0,0,0.5);
        }

        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #0a0a0a;
            border-radius: 0 0 20px 20px;
            z-index: 100;
        }

        .screen {
            height: 100%;
            background: linear-gradient(180deg, #1e1e1e 0%, #141414 100%);
            padding: 50px 24px 24px;
            display: flex;
            flex-direction: column;
        }

        /* Header - Minimal */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-circle {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-circle svg {
            width: 22px;
            height: 22px;
            fill: #1a1a1a;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .menu-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
        }

        .menu-btn span {
            width: 18px;
            height: 2px;
            background: rgba(255,255,255,0.6);
            border-radius: 1px;
        }

        /* Connection Section */
        .connection-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: -40px;
        }

        /* Big Connection Button - Neumorphism Style */
        .connect-btn-wrapper {
            position: relative;
            margin-bottom: 40px;
        }

        .connect-btn-outer {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: #1a1a1a;
            box-shadow: 
                20px 20px 40px #0d0d0d,
                -20px -20px 40px #272727,
                inset 0 0 0 1px rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .connect-btn-outer:hover {
            box-shadow: 
                15px 15px 30px #0d0d0d,
                -15px -15px 30px #272727,
                inset 0 0 0 1px rgba(255,255,255,0.05);
        }

        .connect-btn-outer:active {
            box-shadow: 
                10px 10px 20px #0d0d0d,
                -10px -10px 20px #272727,
                inset 5px 5px 10px #0d0d0d,
                inset -5px -5px 10px #272727;
        }

        .connect-btn-outer.connected {
            box-shadow: 
                0 0 60px rgba(0, 255, 136, 0.3),
                20px 20px 40px #0d0d0d,
                -20px -20px 40px #272727;
        }

        .connect-btn-inner {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: linear-gradient(145deg, #1f1f1f, #171717);
            box-shadow: 
                inset 8px 8px 16px #0d0d0d,
                inset -8px -8px 16px #272727;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
        }

        .connect-btn-outer.connected .connect-btn-inner {
            background: linear-gradient(145deg, #00ff88, #00d9ff);
            box-shadow: 
                inset 8px 8px 16px rgba(0,0,0,0.2),
                inset -8px -8px 16px rgba(255,255,255,0.1);
        }

        .power-icon {
            width: 70px;
            height: 70px;
            fill: rgba(255,255,255,0.3);
            transition: all 0.4s ease;
        }

        .connect-btn-outer.connected .power-icon {
            fill: #1a1a1a;
        }

        /* Status Text */
        .status-container {
            text-align: center;
            margin-bottom: 50px;
        }

        .status-main {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .status-main.connected {
            background: linear-gradient(90deg, #00ff88, #00d9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-sub {
            font-size: 14px;
            color: rgba(255,255,255,0.4);
        }

        /* Server Selector - Pill Style */
        .server-selector {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .server-selector:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.1);
        }

        .server-flag {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .server-flag img {
            width: 32px;
            height: 24px;
            border-radius: 4px;
            object-fit: cover;
        }

        .server-info {
            flex: 1;
        }

        .server-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .server-location {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
        }

        .server-ping {
            padding: 6px 12px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #00ff88;
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }

        .stats-row.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .stat-box {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }

        .stat-icon {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .stat-value.download { color: #00ff88; }
        .stat-value.upload { color: #00d9ff; }
        .stat-value.ping { color: #ffaa00; }

        .stat-label {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Bottom Navigation - Floating Style */
        .bottom-nav {
            position: absolute;
            bottom: 30px;
            left: 24px;
            right: 24px;
            height: 70px;
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 35px;
            display: flex;
            padding: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .nav-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(255,255,255,0.4);
        }

        .nav-item.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .nav-item span {
            font-size: 14px;
            font-weight: 600;
        }

        /* Animated Ring */
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(0, 255, 136, 0.2);
            animation: ring-pulse 2s ease-out infinite;
            pointer-events: none;
            opacity: 0;
        }

        .ring.visible {
            opacity: 1;
        }

        .ring:nth-child(1) { width: 220px; height: 220px; animation-delay: 0s; }
        .ring:nth-child(2) { width: 260px; height: 260px; animation-delay: 0.5s; }
        .ring:nth-child(3) { width: 300px; height: 300px; animation-delay: 1s; }

        @keyframes ring-pulse {
            0% { transform: scale(0.9); opacity: 0.8; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        /* Connection Timer */
        .timer {
            font-size: 13px;
            color: rgba(255,255,255,0.3);
            margin-top: 8px;
            font-variant-numeric: tabular-nums;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .timer.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="notch"></div>
        <div class="screen">
            <!-- Header -->
            <div class="header">
                <div class="logo">
                    <div class="logo-circle">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
                        </svg>
                    </div>
                    <span class="logo-text">Tiksar</span>
                </div>
                <div class="menu-btn">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>

            <!-- Connection Section -->
            <div class="connection-section">
                <!-- Animated Rings -->
                <div class="connect-btn-wrapper">
                    <div class="ring" id="ring1"></div>
                    <div class="ring" id="ring2"></div>
                    <div class="ring" id="ring3"></div>
                    
                    <div class="connect-btn-outer" id="connectBtn" onclick="toggleConnection()">
                        <div class="connect-btn-inner">
                            <svg class="power-icon" viewBox="0 0 24 24">
                                <path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Status -->
                <div class="status-container">
                    <div class="status-main" id="statusMain">قطع شده</div>
                    <div class="status-sub" id="statusSub">برای اتصال ضربه بزنید</div>
                    <div class="timer" id="timer">00:00:00</div>
                </div>

                <!-- Server Selector -->
                <div class="server-selector" onclick="alert('انتخاب سرور')">
                    <div class="server-flag">
                        <img src="https://flagcdn.com/w80/de.png" alt="DE">
                    </div>
                    <div class="server-info">
                        <div class="server-name">اتصال هوشمند</div>
                        <div class="server-location">انتخاب خودکار بهترین سرور</div>
                    </div>
                    <div class="server-ping">42ms</div>
                </div>

                <!-- Stats -->
                <div class="stats-row" id="statsRow">
                    <div class="stat-box">
                        <div class="stat-icon">⬇️</div>
                        <div class="stat-value download">45.2</div>
                        <div class="stat-label">MB/s</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-icon">⬆️</div>
                        <div class="stat-value upload">12.8</div>
                        <div class="stat-label">MB/s</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-icon">📡</div>
                        <div class="stat-value ping">42</div>
                        <div class="stat-label">ms</div>
                    </div>
                </div>
            </div>

            <!-- Bottom Navigation -->
            <div class="bottom-nav">
                <div class="nav-item active">
                    <svg viewBox="0 0 24 24">
                        <path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/>
                    </svg>
                    <span>VPN</span>
                </div>
                <div class="nav-item">
                    <svg viewBox="0 0 24 24">
                        <path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/>
                    </svg>
                    <span>ابزار</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isConnected = false;
        let timerInterval = null;
        let seconds = 0;

        function toggleConnection() {
            isConnected = !isConnected;
            
            const btn = document.getElementById('connectBtn');
            const statusMain = document.getElementById('statusMain');
            const statusSub = document.getElementById('statusSub');
            const statsRow = document.getElementById('statsRow');
            const timer = document.getElementById('timer');
            const rings = document.querySelectorAll('.ring');

            if (isConnected) {
                btn.classList.add('connected');
                statusMain.textContent = 'متصل شدید';
                statusMain.classList.add('connected');
                statusSub.textContent = 'Germany • Frankfurt';
                statsRow.classList.add('visible');
                timer.classList.add('visible');
                rings.forEach(r => r.classList.add('visible'));
                
                // Start timer
                seconds = 0;
                timerInterval = setInterval(() => {
                    seconds++;
                    const h = Math.floor(seconds / 3600);
                    const m = Math.floor((seconds % 3600) / 60);
                    const s = seconds % 60;
                    timer.textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                }, 1000);
            } else {
                btn.classList.remove('connected');
                statusMain.textContent = 'قطع شده';
                statusMain.classList.remove('connected');
                statusSub.textContent = 'برای اتصال ضربه بزنید';
                statsRow.classList.remove('visible');
                timer.classList.remove('visible');
                rings.forEach(r => r.classList.remove('visible'));
                
                // Stop timer
                clearInterval(timerInterval);
            }
        }
    </script>
</body>
</html>
