<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tiksar VPN - UI Redesign</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: linear-gradient(180deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            margin: 20px auto;
            background: linear-gradient(180deg, #0d0d12 0%, #1a1a2e 100%);
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
        }

        /* Status Bar */
        .status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            font-size: 14px;
            font-weight: 600;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px 16px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .logo-text h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .header-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.05);
        }

        /* Main Content */
        .main-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Connection Button */
        .connection-wrapper {
            position: relative;
            margin: 30px 0;
        }

        /* Pulse Rings */
        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 2px solid rgba(16, 185, 129, 0.3);
            animation: pulse 2s ease-out infinite;
        }

        .pulse-ring:nth-child(1) { width: 180px; height: 180px; animation-delay: 0s; }
        .pulse-ring:nth-child(2) { width: 220px; height: 220px; animation-delay: 0.5s; }
        .pulse-ring:nth-child(3) { width: 260px; height: 260px; animation-delay: 1s; }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.3); opacity: 0; }
        }

        .connection-btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(145deg, #4a5568 0%, #3d4654 50%, #2d3748 100%);
            border: none;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 0 40px rgba(74, 85, 104, 0.4),
                inset 0 2px 10px rgba(255,255,255,0.1);
        }

        .connection-btn.connected {
            background: linear-gradient(145deg, #10b981 0%, #059669 50%, #047857 100%);
            box-shadow: 
                0 0 60px rgba(16, 185, 129, 0.5),
                inset 0 2px 10px rgba(255,255,255,0.2);
        }

        .connection-btn:hover {
            transform: scale(1.05);
        }

        .connection-btn:active {
            transform: scale(0.98);
        }

        .connection-btn svg {
            width: 60px;
            height: 60px;
            fill: white;
            transition: all 0.3s ease;
        }

        /* Connection Status */
        .connection-status {
            text-align: center;
            margin-top: 24px;
        }

        .status-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .status-subtext {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }

        /* Server Card - Glassmorphism */
        .server-card {
            width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 16px;
            margin-top: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .server-card:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .server-card-inner {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .server-flag {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, #1a2332 0%, #0f1629 100%);
            border: 1px solid rgba(16, 185, 129, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            overflow: hidden;
        }

        .server-flag img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .server-info {
            flex: 1;
        }

        .server-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .server-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
        }

        .server-arrow {
            color: rgba(255,255,255,0.3);
            font-size: 18px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 14px 10px;
            text-align: center;
        }

        .stat-icon {
            font-size: 20px;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card.download .stat-value { color: #76F959; }
        .stat-card.upload .stat-value { color: #72D9FF; }
        .stat-card.ping .stat-value { color: #FFD700; }

        /* Bottom Tab Bar */
        .tab-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 90px;
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            padding: 12px 24px 30px;
            gap: 16px;
        }

        .tab-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            height: 56px;
            border-radius: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(255,255,255,0.4);
        }

        .tab-item.active {
            background: rgba(255,255,255,0.12);
            color: white;
        }

        .tab-item svg {
            width: 24px;
            height: 24px;
        }

        .tab-item span {
            font-size: 15px;
            font-weight: 600;
        }

        /* Animated Background Particles */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(99, 102, 241, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* Demo Controls */
        .demo-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .demo-btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .demo-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .demo-btn.secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="phone-frame" id="phoneFrame">
        <!-- Animated Particles -->
        <div class="particles" id="particles"></div>

        <!-- Status Bar -->
        <div class="status-bar">
            <span>۹:۴۱</span>
            <span>📶 🔋</span>
        </div>

        <!-- Header -->
        <div class="header">
            <div class="logo-section">
                <div class="logo-icon">🛡️</div>
                <div class="logo-text">
                    <h1>Tiksar VPN</h1>
                    <span>اتصال امن</span>
                </div>
            </div>
            <div class="header-actions">
                <div class="header-btn">🌐</div>
                <div class="header-btn">ℹ️</div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Connection Button -->
            <div class="connection-wrapper">
                <div class="pulse-ring" id="ring1"></div>
                <div class="pulse-ring" id="ring2"></div>
                <div class="pulse-ring" id="ring3"></div>
                <button class="connection-btn" id="connectBtn" onclick="toggleConnection()">
                    <svg id="powerIcon" viewBox="0 0 24 24">
                        <path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/>
                    </svg>
                </button>
            </div>

            <!-- Connection Status -->
            <div class="connection-status">
                <div class="status-text" id="statusText">آماده اتصال</div>
                <div class="status-subtext" id="statusSubtext">برای اتصال ضربه بزنید</div>
            </div>

            <!-- Server Card -->
            <div class="server-card" onclick="alert('صفحه انتخاب سرور')">
                <div class="server-card-inner">
                    <div class="server-flag">
                        <img src="https://flagcdn.com/w80/de.png" alt="Germany" onerror="this.parentElement.innerHTML='🌍'">
                    </div>
                    <div class="server-info">
                        <div class="server-name">اتصال هوشمند</div>
                        <div class="server-desc">انتخاب خودکار بهترین سرور</div>
                    </div>
                    <div class="server-arrow">‹</div>
                </div>
            </div>

            <!-- Stats Grid (shown when connected) -->
            <div class="stats-grid" id="statsGrid" style="display: none;">
                <div class="stat-card download">
                    <div class="stat-icon">⬇️</div>
                    <div class="stat-value">45.2</div>
                    <div class="stat-label">MB/s دانلود</div>
                </div>
                <div class="stat-card upload">
                    <div class="stat-icon">⬆️</div>
                    <div class="stat-value">12.8</div>
                    <div class="stat-label">MB/s آپلود</div>
                </div>
                <div class="stat-card ping">
                    <div class="stat-icon">📡</div>
                    <div class="stat-value">42</div>
                    <div class="stat-label">ms پینگ</div>
                </div>
            </div>
        </div>

        <!-- Bottom Tab Bar -->
        <div class="tab-bar">
            <div class="tab-item active">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/>
                </svg>
                <span>VPN</span>
            </div>
            <div class="tab-item">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/>
                </svg>
                <span>ابزارها</span>
            </div>
        </div>
    </div>

    <!-- Demo Controls -->
    <div class="demo-controls">
        <button class="demo-btn" onclick="toggleConnection()">تغییر وضعیت اتصال</button>
        <button class="demo-btn secondary" onclick="toggleTheme()">تغییر تم رنگی</button>
    </div>

    <script>
        let isConnected = false;
        let currentTheme = 0;

        const themes = [
            { // Default Purple/Green
                gradient: 'linear-gradient(180deg, #0d0d12 0%, #1a1a2e 100%)',
                accent: '#10b981',
                particle: 'rgba(99, 102, 241, 0.3)'
            },
            { // Cyan/Teal
                gradient: 'linear-gradient(180deg, #0a1628 0%, #0d2137 100%)',
                accent: '#06b6d4',
                particle: 'rgba(6, 182, 212, 0.3)'
            },
            { // Orange/Red
                gradient: 'linear-gradient(180deg, #1a0a0a 0%, #2d1515 100%)',
                accent: '#f97316',
                particle: 'rgba(249, 115, 22, 0.3)'
            }
        ];

        function toggleConnection() {
            isConnected = !isConnected;
            const btn = document.getElementById('connectBtn');
            const statusText = document.getElementById('statusText');
            const statusSubtext = document.getElementById('statusSubtext');
            const statsGrid = document.getElementById('statsGrid');
            const rings = document.querySelectorAll('.pulse-ring');

            if (isConnected) {
                btn.classList.add('connected');
                statusText.textContent = 'متصل شدید';
                statusSubtext.textContent = 'آلمان • Frankfurt';
                statsGrid.style.display = 'grid';
                rings.forEach(ring => {
                    ring.style.borderColor = 'rgba(16, 185, 129, 0.3)';
                    ring.style.display = 'block';
                });
            } else {
                btn.classList.remove('connected');
                statusText.textContent = 'آماده اتصال';
                statusSubtext.textContent = 'برای اتصال ضربه بزنید';
                statsGrid.style.display = 'none';
                rings.forEach(ring => {
                    ring.style.display = 'none';
                });
            }
        }

        function toggleTheme() {
            currentTheme = (currentTheme + 1) % themes.length;
            const theme = themes[currentTheme];
            document.getElementById('phoneFrame').style.background = theme.gradient;
            document.querySelectorAll('.particle').forEach(p => {
                p.style.background = theme.particle;
            });
        }

        // Create particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        // Initialize
        createParticles();
        document.querySelectorAll('.pulse-ring').forEach(ring => ring.style.display = 'none');
    </script>
</body>
</html>
