<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Concepts - Tiksar VPN</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: white;
            padding: 40px;
        }
        h1 { text-align: center; margin-bottom: 40px; font-size: 28px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .concept {
            text-align: center;
        }
        .concept h3 {
            margin-bottom: 15px;
            font-size: 16px;
            color: rgba(255,255,255,0.7);
        }
        .phone-frame {
            width: 280px;
            height: 560px;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 0 8px #1a1a1a, 0 20px 40px rgba(0,0,0,0.4);
            margin: 0 auto;
        }
        .demo-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }
        .demo-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .demo-btn svg { width: 50px; height: 50px; fill: rgba(255,255,255,0.6); }
        .demo-text { font-size: 14px; color: rgba(255,255,255,0.6); }

        /* ========== CONCEPT 1: Mesh Gradient ========== */
        .bg-mesh {
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 30%, rgba(139, 92, 246, 0.3) 0%, transparent 45%),
                radial-gradient(ellipse at 70% 80%, rgba(6, 182, 212, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 70%, rgba(16, 185, 129, 0.2) 0%, transparent 45%),
                linear-gradient(180deg, #0a0a0a 0%, #0f0f0f 100%);
        }

        /* ========== CONCEPT 2: Northern Lights ========== */
        .bg-northern {
            background: 
                radial-gradient(ellipse 150% 80% at 50% -20%, rgba(16, 185, 129, 0.3) 0%, transparent 60%),
                radial-gradient(ellipse 100% 60% at 30% 10%, rgba(6, 182, 212, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse 80% 50% at 70% 5%, rgba(99, 102, 241, 0.2) 0%, transparent 50%),
                linear-gradient(180deg, #050808 0%, #0a0a0a 30%, #0f0f0f 100%);
        }

        /* ========== CONCEPT 3: Deep Space ========== */
        .bg-space {
            background: 
                radial-gradient(ellipse at 50% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 20% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 60%, rgba(6, 182, 212, 0.1) 0%, transparent 35%),
                linear-gradient(180deg, #08080c 0%, #0a0a0a 100%);
        }
        .bg-space::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,0.25) 0%, transparent 100%),
                radial-gradient(1px 1px at 80% 50%, rgba(255,255,255,0.15) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 10% 60%, rgba(255,255,255,0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.2) 0%, transparent 100%);
        }

        /* ========== CONCEPT 4: Elegant Dark ========== */
        .bg-elegant {
            background: 
                radial-gradient(ellipse 120% 100% at 50% 100%, rgba(30, 30, 40, 0.8) 0%, transparent 70%),
                radial-gradient(ellipse at 50% -20%, rgba(99, 102, 241, 0.12) 0%, transparent 50%),
                linear-gradient(180deg, #0c0c0e 0%, #0a0a0a 50%, #0e0e10 100%);
        }
        .bg-elegant::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, 
                transparent 0%, 
                rgba(255,255,255,0.01) 50%, 
                transparent 100%);
        }

        /* ========== CONCEPT 5: Cyber Glow ========== */
        .bg-cyber {
            background: 
                radial-gradient(ellipse at 50% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 0% 100%, rgba(16, 185, 129, 0.15) 0%, transparent 40%),
                radial-gradient(ellipse at 100% 100%, rgba(6, 182, 212, 0.15) 0%, transparent 40%),
                linear-gradient(180deg, #0a0a0a 0%, #0a0c0c 100%);
        }
        .bg-cyber::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 200px;
            background: linear-gradient(0deg, rgba(16, 185, 129, 0.05) 0%, transparent 100%);
        }

        /* ========== CONCEPT 6: Minimal Gradient ========== */
        .bg-minimal {
            background: linear-gradient(160deg, 
                #0f0f12 0%, 
                #0a0a0a 40%,
                #0c0c0e 100%);
        }
        .bg-minimal::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(99, 102, 241, 0.06) 0%, transparent 40%);
        }
    </style>
</head>
<body>
    <h1>🎨 انتخاب بکگراند</h1>
    
    <div class="grid">
        <!-- Concept 1 -->
        <div class="concept">
            <h3>۱. Mesh Gradient (گرادیان مشبک)</h3>
            <div class="phone-frame bg-mesh">
                <div class="demo-content">
                    <div class="demo-btn">
                        <svg viewBox="0 0 24 24"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/></svg>
                    </div>
                    <div class="demo-text">آماده اتصال</div>
                </div>
            </div>
        </div>

        <!-- Concept 2 -->
        <div class="concept">

                <div class="demo-content">

                        <svg viewBox="0 0 24 24"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/></svg>
                    </div>
                    <div class="demo-text">آماده اتصال</div>
                </div>
            </div>
        </div>

        <!-- Concept 3 -->
        <div class="concept">
            <h3>۳. Deep Space (فضای عمیق)</h3>
            <div class="phone-frame bg-space">
                <div class="demo-content">
                    <div class="demo-btn">
                        <svg viewBox="0 0 24 24"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/></svg>
                    </div>
                    <div class="demo-text">آماده اتصال</div>
                </div>
            </div>
        </div>

        <!-- Concept 4 -->
        <div class="concept">
            <h3>۴. Elegant Dark (تاریک شیک)</h3>
            <div class="phone-frame bg-elegant">
                <div class="demo-content">
                    <div class="demo-btn">
                        <svg viewBox="0 0 24 24"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/></svg>
                    </div>
                    <div class="demo-text">آماده اتصال</div>
                </div>
            </div>
        </div>

        <!-- Concept 5 -->
        <div class="concept">
            <h3>۵. Cyber Glow (درخشش سایبری)</h3>
            <div class="phone-frame bg-cyber">
                <div class="demo-content">
                    <div class="demo-btn">
                        <svg viewBox="0 0 24 24"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/></svg>
                    </div>
                    <div class="demo-text">آماده اتصال</div>
                </div>
            </div>
        </div>

        <!-- Concept 6 -->
        <div class="concept">
            <h3>۶. Minimal (مینیمال)</h3>
            <div class="phone-frame bg-minimal">
                <div class="demo-content">
                    <div class="demo-btn">
                        <svg viewBox="0 0 24 24"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/></svg>
                    </div>
                    <div class="demo-text">آماده اتصال</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
