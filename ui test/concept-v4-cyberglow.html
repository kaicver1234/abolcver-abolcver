<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tiksar VPN - Concept V4 (Cyber Glow)</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: white;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            border-radius: 50px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 0 12px #1a1a1a, 0 30px 60px rgba(0,0,0,0.5);
        }

        /* Cyber Glow Background */
        .cyber-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 50% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 0% 100%, rgba(16, 185, 129, 0.15) 0%, transparent 40%),
                radial-gradient(ellipse at 100% 100%, rgba(6, 182, 212, 0.15) 0%, transparent 40%),
                linear-gradient(180deg, #0a0a0a 0%, #0a0c0c 100%);
        }
        .cyber-bg::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 250px;
            background: linear-gradient(0deg, rgba(16, 185, 129, 0.06) 0%, transparent 100%);
            pointer-events: none;
        }

        .screen {
            position: relative;
            height: 100%;
            padding: 60px 24px 24px;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        /* Header - Typography Only */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .brand-name {
            font-family: 'Poppins', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .brand-name .tiksar {
            background: linear-gradient(135deg, #fff 0%, #e0e7ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-name .vpn {
            color: #a78bfa;
            font-weight: 600;
            margin-right: 6px;
        }

        .header-btn {
            width: 42px;
            height: 42px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .header-btn svg {
            width: 20px;
            height: 20px;
            fill: rgba(255,255,255,0.5);
            transition: all 0.25s ease;
        }

        .header-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.12);
        }

        .header-btn:hover svg {
            fill: rgba(255,255,255,0.8);
        }

        /* Main Area */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: -20px;
        }

        /* Connection Button */
        .connect-wrapper {
            position: relative;
            margin-bottom: 30px;
        }

        .connect-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(74, 85, 104, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            transition: all 0.5s ease;
        }

        /* Connecting state */
        .connect-wrapper.connecting .connect-glow {
            background: radial-gradient(circle, rgba(251, 191, 36, 0.4) 0%, transparent 70%);
            animation: glow-connecting 1s ease-in-out infinite;
        }

        .connect-wrapper.connected .connect-glow {
            background: radial-gradient(circle, rgba(16, 185, 129, 0.5) 0%, transparent 70%);
            animation: glow-pulse 2.5s ease-in-out infinite;
        }

        @keyframes glow-connecting {
            0%, 100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.4; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; }
        }

        @keyframes glow-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        .connect-btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(74, 85, 104, 0.4), rgba(55, 65, 81, 0.6));
            border: 2px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            z-index: 1;
        }

        .connect-btn:hover {
            transform: scale(1.03);
            border-color: rgba(255,255,255,0.2);
        }

        .connect-wrapper.connecting .connect-btn {
            background: linear-gradient(145deg, rgba(251, 191, 36, 0.4), rgba(245, 158, 11, 0.5));
            border-color: rgba(251, 191, 36, 0.5);
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.25);
            animation: btn-pulse 0.8s ease-in-out infinite;
        }

        @keyframes btn-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .connect-wrapper.connected .connect-btn {
            background: linear-gradient(145deg, rgba(16, 185, 129, 0.5), rgba(6, 182, 212, 0.4));
            border-color: rgba(16, 185, 129, 0.5);
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.35);
        }

        .connect-btn svg {
            width: 55px;
            height: 55px;
            fill: rgba(255,255,255,0.6);
            transition: all 0.4s ease;
        }

        .connect-wrapper.connecting .connect-btn svg {
            fill: rgba(255,255,255,0.9);
            animation: icon-spin 1.2s linear infinite;
        }

        @keyframes icon-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .connect-wrapper.connected .connect-btn svg {
            fill: white;
        }

        /* Loading spinner for connecting state */
        .connect-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 170px;
            height: 170px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: rgba(251, 191, 36, 0.8);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .connect-wrapper.connecting .connect-spinner {
            opacity: 1;
            animation: spinner-rotate 1s linear infinite;
        }

        @keyframes spinner-rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Status */
        .status {
            text-align: center;
            margin-bottom: 35px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 30px;
            margin-bottom: 12px;
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            transition: all 0.3s ease;
        }

        .status-badge.connected {
            background: rgba(16, 185, 129, 0.12);
            border-color: rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .status-badge.connected .status-dot {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
            animation: dot-pulse 1.5s ease-in-out infinite;
        }

        @keyframes dot-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .status-text {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
        }

        .connected-only {
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .connected-only.visible {
            opacity: 1;
            visibility: visible;
        }

        .status-timer {
            font-size: 34px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin-top: 8px;
            opacity: 0;
            height: 0;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .status-timer.visible {
            opacity: 1;
            height: auto;
            background: linear-gradient(90deg, #10b981, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Server Card */
        .server-card {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .server-card:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.1);
        }

        .server-card-inner {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .server-avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(139, 92, 246, 0.08));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }

        .server-details { flex: 1; }

        .server-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .server-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
        }

        .server-ping {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #10b981;
        }

        .server-arrow {
            color: rgba(255,255,255,0.2);
            font-size: 20px;
        }

        /* Stats Container */
        .stats-container {
            width: 100%;
            margin-top: 16px;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .stats-container.visible {
            opacity: 1;
            max-height: 120px;
        }

        .stats-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 18px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            position: relative;
        }

        .stat-item:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 36px;
            width: 1px;
            background: rgba(255,255,255,0.08);
        }

        .stat-row {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .stat-unit {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            font-weight: 500;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-label .icon {
            font-size: 10px;
        }

        .stat-value.dl { color: #10b981; }
        .stat-value.ul { color: #06b6d4; }
        .stat-value.pg { color: #a78bfa; }

        /* Bottom Nav */
        .bottom-nav {
            position: absolute;
            bottom: 24px;
            left: 24px;
            right: 24px;
            height: 60px;
            background: rgba(18, 18, 20, 0.9);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 30px;
            display: flex;
            padding: 5px;
        }

        .nav-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-radius: 26px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            font-weight: 600;
        }

        .nav-item.active {
            background: rgba(255,255,255,0.08);
            color: white;
        }

        .nav-item:hover:not(.active) {
            color: rgba(255,255,255,0.6);
        }

        /* Settings Modal */
        .settings-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .settings-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .settings-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            width: calc(100% - 48px);
            background: rgba(20, 20, 22, 0.98);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 24px;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .settings-overlay.open .settings-panel {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .settings-title {
            font-size: 18px;
            font-weight: 700;
        }

        .settings-close {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .settings-close:hover {
            background: rgba(255,255,255,0.1);
        }

        .settings-close svg {
            width: 18px;
            height: 18px;
            fill: rgba(255,255,255,0.6);
        }

        .settings-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .settings-item:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.1);
        }

        .settings-item:last-child {
            margin-bottom: 0;
        }

        .settings-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(139, 92, 246, 0.08));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .settings-icon svg {
            width: 22px;
            height: 22px;
            fill: #a78bfa;
        }

        .settings-info {
            flex: 1;
        }

        .settings-label {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .settings-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
        }

        .settings-arrow {
            color: rgba(255,255,255,0.2);
            font-size: 18px;
        }

        /* Language Selection */
        .language-options {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .language-options.open {
            display: block;
        }

        .lang-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 8px;
        }

        .lang-option:hover {
            background: rgba(255,255,255,0.05);
        }

        .lang-option.selected {
            background: rgba(16, 185, 129, 0.12);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .lang-flag {
            font-size: 22px;
        }

        .lang-name {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
        }

        .lang-check {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .lang-option.selected .lang-check {
            background: #10b981;
            border-color: #10b981;
        }

        .lang-option.selected .lang-check::after {
            content: '✓';
            font-size: 12px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="cyber-bg"></div>

        <div class="screen">
            <!-- Header -->
            <div class="header">
                <div class="brand-name"><span class="tiksar">Tiksar</span><span class="vpn">VPN</span></div>
                <div class="header-btn" onclick="openSettings()">
                    <svg viewBox="0 0 24 24">
                        <path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                    </svg>
                </div>
            </div>

            <!-- Main Area -->
            <div class="main-area">
                <div class="connect-wrapper" id="connectWrapper">
                    <div class="connect-glow"></div>
                    <div class="connect-spinner"></div>
                    <div class="connect-btn" onclick="toggleConnection()">
                        <svg viewBox="0 0 24 24">
                            <path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/>
                        </svg>
                    </div>
                </div>

                <div class="status">
                    <div class="status-badge connected-only" id="statusBadge">
                        <div class="status-dot"></div>
                        <span id="statusLabel">متصل</span>
                    </div>
                    <div class="status-text connected-only" id="statusText">Germany • Frankfurt</div>
                    <div class="status-timer" id="timer">00:00:00</div>
                </div>

                <div class="server-card">
                    <div class="server-card-inner">
                        <div class="server-avatar">🚀</div>
                        <div class="server-details">
                            <div class="server-name">اتصال هوشمند</div>
                            <div class="server-meta">
                                <span>انتخاب خودکار</span>
                            </div>
                        </div>
                        <div class="server-arrow">‹</div>
                    </div>
                    
                </div>

                <!-- Stats Card (separate from server card) -->
                <div class="stats-container" id="statsContainer">
                    <div class="stats-card">
                        <div class="stat-item">
                            <div class="stat-row">
                                <span class="stat-value dl">45.2</span>
                                <span class="stat-unit">MB/s</span>
                            </div>
                            <div class="stat-label"><span class="icon">↓</span> دانلود</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-row">
                                <span class="stat-value ul">12.8</span>
                                <span class="stat-unit">MB/s</span>
                            </div>
                            <div class="stat-label"><span class="icon">↑</span> آپلود</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-row">
                                <span class="stat-value pg">42</span>
                                <span class="stat-unit">ms</span>
                            </div>
                            <div class="stat-label"><span class="icon">●</span> پینگ</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom Nav -->
            <div class="bottom-nav">
                <div class="nav-item active">VPN</div>
                <div class="nav-item">ابزارها</div>
            </div>

            <!-- Settings Modal -->
            <div class="settings-overlay" id="settingsOverlay" onclick="closeSettings(event)">
                <div class="settings-panel" onclick="event.stopPropagation()">
                    <div class="settings-header">
                        <div class="settings-title">تنظیمات</div>
                        <div class="settings-close" onclick="closeSettings()">
                            <svg viewBox="0 0 24 24">
                                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                            </svg>
                        </div>
                    </div>

                    <!-- Language Setting -->
                    <div class="settings-item" onclick="toggleLanguageOptions()">
                        <div class="settings-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/>
                            </svg>
                        </div>
                        <div class="settings-info">
                            <div class="settings-label">زبان</div>
                            <div class="settings-desc" id="currentLang">فارسی</div>
                        </div>
                        <div class="settings-arrow">‹</div>
                    </div>

                    <div class="language-options" id="languageOptions">
                        <div class="lang-option selected" onclick="selectLanguage('fa', 'فارسی')">
                            <span class="lang-flag">🦁</span>
                            <span class="lang-name">فارسی</span>
                            <div class="lang-check"></div>
                        </div>
                        <div class="lang-option" onclick="selectLanguage('en', 'English')">
                            <span class="lang-flag">🇬🇧</span>
                            <span class="lang-name">English</span>
                            <div class="lang-check"></div>
                        </div>
                    </div>

                    <!-- About Setting -->
                    <div class="settings-item" onclick="showAbout()">
                        <div class="settings-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
                            </svg>
                        </div>
                        <div class="settings-info">
                            <div class="settings-label">درباره ما</div>
                            <div class="settings-desc">نسخه ۱.۰.۰</div>
                        </div>
                        <div class="settings-arrow">‹</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let connectionState = 'disconnected';
        let timerInterval = null;
        let seconds = 0;

        // Settings functions
        function openSettings() {
            document.getElementById('settingsOverlay').classList.add('open');
        }

        function closeSettings(event) {
            if (!event || event.target.id === 'settingsOverlay') {
                document.getElementById('settingsOverlay').classList.remove('open');
                document.getElementById('languageOptions').classList.remove('open');
            }
        }

        function toggleLanguageOptions() {
            document.getElementById('languageOptions').classList.toggle('open');
        }

        function selectLanguage(code, name) {
            document.querySelectorAll('.lang-option').forEach(opt => opt.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            document.getElementById('currentLang').textContent = name;
        }

        function showAbout() {
            alert('Tiksar VPN\nنسخه ۱.۰.۰\n\nتوسعه داده شده با ❤️');
        }

        function toggleConnection() {
            const wrapper = document.getElementById('connectWrapper');
            const badge = document.getElementById('statusBadge');
            const text = document.getElementById('statusText');
            const timer = document.getElementById('timer');
            const statsContainer = document.getElementById('statsContainer');

            if (connectionState === 'disconnected') {
                // Start connecting
                connectionState = 'connecting';
                wrapper.classList.add('connecting');
                wrapper.classList.remove('connected');
                
                // Simulate connection delay (1.5 seconds)
                setTimeout(() => {
                    if (connectionState === 'connecting') {
                        // Connected!
                        connectionState = 'connected';
                        wrapper.classList.remove('connecting');
                        wrapper.classList.add('connected');
                        badge.classList.add('connected', 'visible');
                        text.classList.add('visible');
                        timer.classList.add('visible');
                        statsContainer.classList.add('visible');
                        
                        seconds = 0;
                        timerInterval = setInterval(() => {
                            seconds++;
                            const h = Math.floor(seconds / 3600);
                            const m = Math.floor((seconds % 3600) / 60);
                            const s = seconds % 60;
                            timer.textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                        }, 1000);
                    }
                }, 1500);
                
            } else if (connectionState === 'connecting') {
                // Cancel connecting
                connectionState = 'disconnected';
                wrapper.classList.remove('connecting');
                
            } else {
                // Disconnect
                connectionState = 'disconnected';
                wrapper.classList.remove('connected');
                badge.classList.remove('connected', 'visible');
                text.classList.remove('visible');
                timer.classList.remove('visible');
                statsContainer.classList.remove('visible');
                clearInterval(timerInterval);
            }
        }
    </script>
</body>
</html>
