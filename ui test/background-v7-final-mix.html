<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background V7 - Final Mix (V3 Top + V5 Bottom)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        .mobile-frame {
            width: 375px;
            height: 812px;
            margin: 20px auto;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 0 12px #1a1a1a, 0 0 0 14px #333, 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a0a;
        }
        
        /* Center dark area from V5 */
        .center-dark {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 40%, #0c0c12 0%, #0a0a0a 70%);
        }
        
        /* Top Aurora effect from V3 - with blur - darker */
        .top-aurora {
            position: absolute;
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 450px;
            background: radial-gradient(ellipse 80% 50% at 50% 30%, rgba(99, 102, 241, 0.08) 0%, transparent 60%);
            filter: blur(30px);
        }
        
        /* Bottom green/cyan blend from V5 - seamless - darker */
        .bottom-glow {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 45%;
            background: 
                linear-gradient(180deg, transparent 0%, rgba(16, 185, 129, 0.03) 60%, rgba(16, 185, 129, 0.06) 100%),
                radial-gradient(ellipse at 30% 100%, rgba(16, 185, 129, 0.08) 0%, transparent 45%),
                radial-gradient(ellipse at 70% 100%, rgba(6, 182, 212, 0.06) 0%, transparent 45%);
        }
        
        .content {
            position: relative;
            z-index: 10;
            color: white;
            text-align: center;
            padding-top: 100px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .title { font-size: 24px; font-weight: 700; }
        .subtitle { font-size: 14px; opacity: 0.5; margin-top: 10px; }
    </style>
</head>
<body style="background: #000; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div class="mobile-frame">
        <div class="center-dark"></div>
        <div class="top-aurora"></div>
        <div class="bottom-glow"></div>
        <div class="content">
            <div class="title">V7 - Final Mix</div>
            <div class="subtitle">V3 Aurora Top + V5 Blend Bottom</div>
        </div>
    </div>
</body>
</html>
