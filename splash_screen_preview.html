<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiksar VPN - Splash Screen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            padding: 20px;
        }

        /* iPhone Frame */
        .phone-frame {
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }

        /* Notch */
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 30px;
            background: #000;
            border-radius: 0 0 20px 20px;
            z-index: 100;
        }

        /* Screen Content */
        .screen {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 60px 40px 30px;
        }

        /* Logo Container */
        .logo-container {
            position: relative;
            width: 200px;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
            animation: logoAppear 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes logoAppear {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Animated Lines Behind T */
        .lines-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: 1;
        }

        .line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                #6366f1 20%, 
                #8b5cf6 50%, 
                #6366f1 80%, 
                transparent 100%);
            opacity: 0.6;
            animation: slideRight 2.5s linear infinite;
        }

        .line:nth-child(1) {
            top: 30%;
            animation-delay: 0s;
        }

        .line:nth-child(2) {
            top: 50%;
            animation-delay: 0.4s;
        }

        .line:nth-child(3) {
            top: 70%;
            animation-delay: 0.8s;
        }

        @keyframes slideRight {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }

        /* Letter T */
        .logo-t {
            font-size: 140px;
            font-weight: 900;
            color: #ffffff;
            position: relative;
            z-index: 2;
            text-shadow: 
                0 0 20px rgba(99, 102, 241, 0.5),
                0 0 40px rgba(139, 92, 246, 0.3);
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                text-shadow: 
                    0 0 20px rgba(99, 102, 241, 0.5),
                    0 0 40px rgba(139, 92, 246, 0.3);
            }
            50% {
                text-shadow: 
                    0 0 30px rgba(99, 102, 241, 0.8),
                    0 0 60px rgba(139, 92, 246, 0.5),
                    0 0 80px rgba(99, 102, 241, 0.3);
            }
        }

        /* App Name Section */
        .app-info {
            text-align: center;
            margin-bottom: 120px;
        }

        .app-name {
            font-size: 36px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.4s forwards;
        }

        .app-tagline {
            font-size: 13px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.6s forwards;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Wave Loading Animation */
        .loading-container {
            display: flex;
            gap: 5px;
            align-items: flex-end;
            height: 35px;
            margin-bottom: 50px;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.8s forwards;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        .loading-bar {
            width: 4px;
            height: 35px;
            background: linear-gradient(180deg, #8b5cf6 0%, #6366f1 100%);
            border-radius: 2px;
            animation: waveAnimation 1.2s ease-in-out infinite;
        }

        .loading-bar:nth-child(1) {
            animation-delay: 0s;
        }

        .loading-bar:nth-child(2) {
            animation-delay: 0.1s;
        }

        .loading-bar:nth-child(3) {
            animation-delay: 0.2s;
        }

        .loading-bar:nth-child(4) {
            animation-delay: 0.3s;
        }

        .loading-bar:nth-child(5) {
            animation-delay: 0.4s;
        }

        @keyframes waveAnimation {
            0%, 100% {
                transform: scaleY(0.3);
            }
            50% {
                transform: scaleY(1);
            }
        }

        /* Version Number */
        .version {
            position: absolute;
            bottom: 30px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.25);
            opacity: 0;
            animation: fadeIn 0.8s ease-out 1s forwards;
        }

        /* Responsive adjustments */
        @media (max-width: 400px) {
            .phone-frame {
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="notch"></div>
        <div class="screen">
            <!-- Logo with animated lines -->
            <div class="logo-container">
                <div class="lines-container">
                    <div class="line"></div>
                    <div class="line"></div>
                    <div class="line"></div>
                </div>
                <div class="logo-t">T</div>
            </div>

            <!-- App Name and Tagline -->
            <div class="app-info">
                <div class="app-name">Tiksar</div>
                <div class="app-tagline">VPN</div>
            </div>

            <!-- Wave Loading Animation -->
            <div class="loading-container">
                <div class="loading-bar"></div>
                <div class="loading-bar"></div>
                <div class="loading-bar"></div>
                <div class="loading-bar"></div>
                <div class="loading-bar"></div>
            </div>

            <!-- Version Number -->
            <div class="version">v1.1.5</div>
        </div>
    </div>
</body>
</html>
