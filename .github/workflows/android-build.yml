name: Build Android Release

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'lib/**'
      - 'android/**'
      - 'local_packages/**'
      - 'pubspec.yaml'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.1'
        channel: 'stable'
        cache: true
        
    - name: Flutter Doctor
      run: flutter doctor -v
      
    - name: Get dependencies
      run: flutter pub get
      
    - name: Analyze code
      run: flutter analyze
      continue-on-error: true
      
    - name: Build APK (Release)
      run: flutter build apk --release --split-per-abi
      
    - name: Build App Bundle (Release)
      run: flutter build appbundle --release
      
    - name: Rename output files
      run: |
        cd build/app/outputs/flutter-apk
        mv app-armeabi-v7a-release.apk TiksarVPN-v1.1.1-armeabi-v7a.apk || true
        mv app-arm64-v8a-release.apk TiksarVPN-v1.1.1-arm64-v8a.apk || true
        mv app-x86_64-release.apk TiksarVPN-v1.1.1-x86_64.apk || true
        cd ../bundle/release
        mv app-release.aab TiksarVPN-v1.1.1.aab
      
    - name: Create Build Info
      run: |
        cd build/app/outputs/flutter-apk
        echo "Tiksar VPN - Android Build" > BUILD_INFO.txt
        echo "Version: 1.1.1" >> BUILD_INFO.txt
        echo "Build Date: $(date +'%Y-%m-%d %H:%M:%S')" >> BUILD_INFO.txt
        echo "Platform: Android" >> BUILD_INFO.txt
        echo "" >> BUILD_INFO.txt
        echo "Files:" >> BUILD_INFO.txt
        echo "- arm64-v8a: For modern 64-bit Android devices (recommended)" >> BUILD_INFO.txt
        echo "- armeabi-v7a: For older 32-bit Android devices" >> BUILD_INFO.txt
        echo "- x86_64: For x86 Android devices (rare)" >> BUILD_INFO.txt
        echo "- AAB: For Google Play Store upload" >> BUILD_INFO.txt
      
    - name: Upload APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TiksarVPN-Android-APKs-v1.1.1
        path: |
          build/app/outputs/flutter-apk/*.apk
          build/app/outputs/flutter-apk/BUILD_INFO.txt
        retention-days: 30
        
    - name: Upload AAB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TiksarVPN-Android-AAB-v1.1.1
        path: build/app/outputs/bundle/release/*.aab
        retention-days: 90

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/app/outputs/flutter-apk/TiksarVPN-v1.1.1-arm64-v8a.apk
          build/app/outputs/flutter-apk/TiksarVPN-v1.1.1-armeabi-v7a.apk
          build/app/outputs/bundle/release/TiksarVPN-v1.1.1.aab
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
